<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Bar 1 — left, shortest -->
  <rect x="11" y="40" width="10" height="12" rx="3" fill="rgba(255,255,255,0.70)">
    <animate attributeName="height" values="12;22;12" dur="1.6s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
    <animate attributeName="y" values="40;30;40" dur="1.6s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
  </rect>

  <!-- Bar 2 — center, medium -->
  <rect x="27" y="30" width="10" height="22" rx="3" fill="rgba(255,255,255,0.88)">
    <animate attributeName="height" values="22;34;22" dur="1.6s" begin="0.27s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
    <animate attributeName="y" values="30;18;30" dur="1.6s" begin="0.27s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
  </rect>

  <!-- Bar 3 — right, tallest -->
  <rect x="43" y="20" width="10" height="32" rx="3" fill="rgba(255,255,255,1)">
    <animate attributeName="height" values="32;18;32" dur="1.6s" begin="0.54s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
    <animate attributeName="y" values="20;34;20" dur="1.6s" begin="0.54s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45,0,0.55,1;0.45,0,0.55,1"/>
  </rect>
</svg>
