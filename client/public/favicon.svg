<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0F172A"/>

  <!-- Bars -->
  <rect x="14" y="44" width="6" height="0" rx="2" fill="url(#grad)">
    <animate attributeName="y" values="44;30;44" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;14;0" dur="1.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="26" y="44" width="6" height="0" rx="2" fill="url(#grad)">
    <animate attributeName="y" values="44;22;44" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;22;0" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="38" y="44" width="6" height="0" rx="2" fill="url(#grad)">
    <animate attributeName="y" values="44;14;44" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;30;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
</svg>